<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Pressing Sets Explorer - Extension</title>
    <link rel="stylesheet" href="/static/css/style.css">
</head>
<body>

    <header>
        <h1>Pressing Sets Explorer <span>Extension Project</span></h1>
        <nav>
            <button class="nav-btn active" data-tab="explore">🎛️ Exploration</button>
            <button class="nav-btn" data-tab="analyze">📊 Analyse de Morceau</button>
        </nav>
    </header>

    <main id="explore-tab" class="tab-content active">

        <section class="control-panel">
            <div class="control-group">
                <label for="set-type-select">Type de Pressing Set :</label>
                <select id="set-type-select">
                    <option value="" disabled selected>Choisir une structure...</option>
                    <option value="Diatonic">Diatonic (7)</option>
                    <option value="Acoustic">Acoustic (7)</option>
                    <option value="Octatonic">Octatonic (8)</option>
                    <option value="Whole Tone">Whole Tone (6)</option>
                    <option value="Hexatonic">Hexatonic (6)</option>
                    <option value="Harmonic Minor">Harmonic Minor (7)</option>
                    <option value="Harmonic Major">Harmonic Major (7)</option>
                </select>
            </div>

            <div class="control-group">
                <label for="root-select">Transposition (Fondamentale) :</label>
                <select id="root-select" disabled>
                    <option value="" disabled selected>Choisir une note...</option>
                    <option value="C">C</option>
                    <option value="C#">C#</option>
                    <option value="D">D</option>
                    <option value="D#">D#</option>
                    <option value="E">E</option>
                    <option value="F">F</option>
                    <option value="F#">F#</option>
                    <option value="G">G</option>
                    <option value="G#">G#</option>
                    <option value="A">A</option>
                    <option value="A#">A#</option>
                    <option value="B">B</option>
                </select>
            </div>

            <div class="control-group">
                <label for="distance-select">Profondeur de l'horizon (Distance max) :</label>
                <select id="distance-select">
                    <option value="1" selected>Distance 1 (Voisins directs)</option>
                    <option value="2">Distance 2</option>
                    <option value="3">Distance 3</option>
                    <option value="4">Distance 4 (Atlas complet)</option>
                </select>
            </div>
        </section>

        <section class="piano-container">
            <div class="piano">
                <div class="key white" data-note="0"><span>C</span></div>
                <div class="key black" data-note="1"><span>C#</span></div>
                <div class="key white" data-note="2"><span>D</span></div>
                <div class="key black" data-note="3"><span>D#</span></div>
                <div class="key white" data-note="4"><span>E</span></div>
                <div class="key white" data-note="5"><span>F</span></div>
                <div class="key black" data-note="6"><span>F#</span></div>
                <div class="key white" data-note="7"><span>G</span></div>
                <div class="key black" data-note="8"><span>G#</span></div>
                <div class="key white" data-note="9"><span>A</span></div>
                <div class="key black" data-note="10"><span>A#</span></div>
                <div class="key white" data-note="11"><span>B</span></div>
            </div>
        </section>

        </section> <section id="keyboard-matches-container" style="display: none; margin-top: 20px; background-color: #1b2026; padding: 15px; border-radius: 8px; border: 1px solid #232931;">
            <h3 style="color: #ffffff; font-family: 'Segoe UI', sans-serif; margin-top: 0; margin-bottom: 15px;">
                Collections parentes détectées (<span id="match-count">0</span>) :
            </h3>
            <ul id="matches-list" style="list-style: none; padding: 0; margin: 0; max-height: 200px; overflow-y: auto;">
                </ul>
        </section>


        <section class="results-container">
            <h2>Cartographie Topologique Interactive</h2>
            <div id="network-container" style="width: 100%; height: 500px; background-color: #1b2026; border-radius: 8px; border: 1px solid #232931; margin-top: 15px;"></div>
        </section>

        <script type="text/javascript" src="https://unpkg.com/vis-network/standalone/umd/vis-network.min.js"></script>

    </main>

    <script src="/static/js/main.js"></script>
</body>
</html>
